<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Place D'Alie — Exclusive Specials</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #C0392B; --orange: #E8610A; --gold: #D4AF37; --dark: #111; --cream: #FFF8F0; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--cream);
            padding-bottom: 80px;
        }

        /* FLASH GLOW */
        @keyframes pulseGlow {
            0%   { box-shadow: 0 0 5px var(--gold); }
            50%  { box-shadow: 0 0 25px var(--gold); border-color: var(--gold); }
            100% { box-shadow: 0 0 5px var(--gold); }
        }
        .flash-active { animation: pulseGlow 2s infinite; border: 2px solid transparent; }

        /* HERO */
        .hero {
            background: var(--dark);
            color: white;
            padding: 36px 20px 28px;
            text-align: center;
            border-bottom: 4px solid var(--red);
        }
        .hero h1 {
            font-family: 'Bebas Neue';
            font-size: 2.6rem;
            letter-spacing: 2px;
            line-height: 1;
        }
        .hero p {
            color: #aaa;
            font-size: 0.8rem;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: #bbb;
        }
        .empty-state span { font-size: 3rem; display: block; margin-bottom: 12px; }
        .empty-state p { font-size: 0.9rem; }

        /* GRID — single column on mobile, wider on tablet+ */
        .specials-grid {
            padding: 14px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        @media (min-width: 540px) {
            .specials-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* CARD */
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            position: relative;
            transition: transform 0.2s;
            border: 2px solid transparent;
        }
        .card:active { transform: scale(0.98); }

        .card img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            display: block;
        }

        /* BADGE */
        .timer-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--red);
            color: white;
            padding: 4px 10px;
            border-radius: 5px;
            font-weight: 900;
            font-size: 0.72rem;
            letter-spacing: 0.3px;
            z-index: 10;
        }
        .flash-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--gold);
            color: #111;
            padding: 4px 10px;
            border-radius: 5px;
            font-weight: 900;
            font-size: 0.72rem;
            z-index: 10;
        }

        /* CARD BODY */
        .card-body { padding: 14px 16px 16px; }

        .card-body h2 {
            font-family: 'Bebas Neue';
            font-size: 1.6rem;
            line-height: 1;
            color: var(--dark);
            letter-spacing: 0.5px;
        }

        .card-body p {
            color: #777;
            font-size: 0.82rem;
            margin: 6px 0 10px;
            line-height: 1.4;
        }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 12px;
        }
        .old-price {
            text-decoration: line-through;
            color: #bbb;
            font-size: 1rem;
        }
        .new-price {
            color: var(--red);
            font-size: 1.9rem;
            font-weight: 900;
            line-height: 1;
        }

        /* SAVINGS PILL */
        .savings {
            background: #fff0f0;
            color: var(--red);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            align-self: center;
        }

        /* BUTTONS */
        .btn-row {
            display: flex;
            gap: 8px;
        }
        .btn-claim {
            flex: 1;
            background: var(--red);
            color: white;
            border: none;
            padding: 13px 10px;
            border-radius: 10px;
            font-family: 'Bebas Neue';
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-claim:active { opacity: 0.85; }
        .btn-wa {
            background: #25D366;
            color: white;
            border: none;
            padding: 13px 16px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        .btn-wa:active { opacity: 0.85; }

        /* CLAIM MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 30px 24px 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }
        .modal-icon { font-size: 3rem; margin-bottom: 10px; }
        .modal h3 { font-family: 'Bebas Neue'; font-size: 2rem; color: var(--dark); }
        .modal p { color: #666; font-size: 0.9rem; margin: 8px 0 20px; line-height: 1.5; }
        .modal-close {
            width: 100%;
            background: var(--dark);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-family: 'Bebas Neue';
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* STAFF LINK */
        .staff-link {
            position: fixed;
            bottom: 18px;
            right: 16px;
            background: var(--dark);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: 'Nunito';
            opacity: 0.55;
            z-index: 500;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Place D'Alie Specials</h1>
        <p>Today's Exclusive Deals</p>
    </section>

    <div class="specials-grid" id="display"></div>

    <!-- CLAIM MODAL -->
    <div class="modal-overlay" id="claimModal" onclick="closeModal(event)">
        <div class="modal">
            <div class="modal-icon">🎉</div>
            <h3>Deal Claimed!</h3>
            <p>Show this screen to our staff to redeem your special. Valid today only.</p>
            <button class="modal-close" onclick="document.getElementById('claimModal').classList.remove('open')">Got It</button>
        </div>
    </div>

    <button class="staff-link" onclick="adminLogin()">Manager Login</button>

    <script>
        // Track view
        localStorage.setItem('dalie_views', (parseInt(localStorage.getItem('dalie_views')) || 0) + 1);

        function adminLogin() {
            const pin = prompt("Enter PIN:");
            if(pin === '1234') {
                sessionStorage.setItem('isManager', 'true');
                window.location.href = "admin.html";
            } else if(pin !== null) {
                alert("Incorrect PIN");
            }
        }

        function trackClick() {
            localStorage.setItem('dalie_clicks', (parseInt(localStorage.getItem('dalie_clicks')) || 0) + 1);
            document.getElementById('claimModal').classList.add('open');
        }

        function closeModal(e) {
            if(e.target === document.getElementById('claimModal'))
                document.getElementById('claimModal').classList.remove('open');
        }

        function shareWA(title, price) {
            const text = encodeURIComponent(`Check out this deal at Place D'Alie: ${title} for only K${price}! 🔥`);
            window.open(`https://wa.me/?text=${text}`);
        }

        function render() {
            const data = JSON.parse(localStorage.getItem('dalie_promos')) || [];
            const container = document.getElementById('display');

            if(!data.length) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <span>🍽️</span>
                        <p>No specials right now.<br>Check back soon!</p>
                    </div>`;
                return;
            }

            container.innerHTML = data.map(p => {
                const savings = p.oldPrice && p.newPrice
                    ? Math.round(((p.oldPrice - p.newPrice) / p.oldPrice) * 100)
                    : null;

                return `
                    <div class="card ${p.flash ? 'flash-active' : ''}">
                        <div class="timer-badge">⏳ LIMITED OFFER</div>
                        ${p.flash ? '<div class="flash-badge">⚡ FLASH</div>' : ''}
                        <img src="${p.image || 'https://via.placeholder.com/400x190'}" alt="${p.title}">
                        <div class="card-body">
                            <h2>${p.title}</h2>
                            <p>${p.desc}</p>
                            <div class="price-row">
                                ${p.oldPrice ? `<span class="old-price">K${p.oldPrice}</span>` : ''}
                                <span class="new-price">K${p.newPrice}</span>
                                ${savings ? `<span class="savings">-${savings}%</span>` : ''}
                            </div>
                            <div class="btn-row">
                                <button class="btn-claim" onclick="trackClick()">CLAIM DEAL</button>
                                <button class="btn-wa" onclick="shareWA('${p.title.replace(/'/g,"\\'")}', '${p.newPrice}')" title="Share on WhatsApp">
                                    <svg width="20" height="20" viewBox="0 0 32 32" fill="white" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M16 2C8.268 2 2 8.268 2 16c0 2.484.676 4.813 1.854 6.813L2 30l7.387-1.854A13.924 13.924 0 0016 30c7.732 0 14-6.268 14-14S23.732 2 16 2zm7.07 19.536c-.293.826-1.723 1.58-2.352 1.676-.602.09-1.365.128-2.203-.138a20.26 20.26 0 01-1.994-.738C13.08 21.1 10.7 18.282 10.5 18.02c-.196-.26-1.62-2.154-1.62-4.113 0-1.958 1.026-2.92 1.39-3.314.364-.393.793-.49 1.058-.49.264 0 .528.002.76.014.244.012.57-.093.892.68.33.79 1.12 2.732 1.217 2.93.098.196.163.424.033.682-.13.26-.196.42-.392.648-.196.228-.413.51-.59.684-.196.196-.4.407-.172.797.228.39.013 2.03 2.258 3.295.82.478 1.464.625 1.77.696.306.07.484.058.663-.036.18-.096.773-.903.98-1.21.207-.308.412-.256.693-.154.282.104 1.787.843 2.094.997.306.153.51.228.586.356.077.13.077.75-.217 1.575z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        render();
    </script>
</body>
</html>
