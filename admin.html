<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Place D'Alie</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #C0392B; --dark: #111; --gold: #D4AF37; }
        body { font-family: 'Nunito', sans-serif; background: #f4f4f4; padding: 20px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--dark); color: white; padding: 20px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--red); }
        .stat-card span { display: block; font-size: 2rem; color: var(--gold); font-family: 'Bebas Neue'; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--red); color: white; border: none; padding: 12px; cursor: pointer; width: 100%; border-radius: 5px; font-family: 'Bebas Neue'; font-size: 1.2rem; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .promo-item { border-bottom: 1px solid #eee; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .flash-badge { color: var(--gold); font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="lock" class="lock-screen">
        <h1 style="font-family:'Bebas Neue'; font-size: 3rem;">Manager PIN Required</h1>
        <input type="password" id="pin" placeholder="••••" style="width: 150px; text-align: center; font-size: 2rem;">
        <button onclick="check()" style="width: 150px;">Unlock</button>
    </div>

    <div id="content" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="font-family:'Bebas Neue'; margin:0;">Business Dashboard</h1>
            <button onclick="logout()" style="width:100px; background:#333; font-size: 0.9rem;">Logout</button>
        </div>

        <div class="stats" id="statsDisplay">
            </div>

        <div class="container">
            <div class="box">
                <h2 style="font-family:'Bebas Neue';">Post New Special</h2>
                <label>Food Photo:</label>
                <input type="file" id="img" accept="image/*">
                <input type="text" id="title" placeholder="Special Name (e.g. T-Bone Steak)">
                <div style="display:flex; gap:10px;">
                    <input type="number" id="p1" placeholder="Old Price (K)">
                    <input type="number" id="p2" placeholder="Sale Price (K)">
                </div>
                <textarea id="desc" placeholder="Describe the deal..."></textarea>
                <label style="display:flex; align-items:center; gap:10px; margin: 10px 0; font-weight: bold;">
                    <input type="checkbox" id="flashToggle" style="width:auto;"> Activate Flash Mode (Glow Effect)
                </label>
                <button onclick="save()">Launch Special</button>
            </div>

            <div class="box">
                <h2 style="font-family:'Bebas Neue';">Current Inventory</h2>
                <div id="list"></div>
            </div>
        </div>
    </div>

    <script>
        // --- SECURITY LOGIC ---
        if(sessionStorage.getItem('isManager')) unlock();
        
        function check(){ 
            if(document.getElementById('pin').value === '1234') {
                sessionStorage.setItem('isManager', 'true');
                unlock();
            } else {
                alert("Wrong PIN");
            }
        }

        function unlock(){ 
            document.getElementById('lock').style.display = 'none'; 
            document.getElementById('content').style.display = 'block';
            load();
        }

        function logout(){ 
            sessionStorage.removeItem('isManager'); 
            location.reload(); 
        }

        // --- CORE BUSINESS LOGIC ---
        function save() {
            const file = document.getElementById('img').files[0];
            if(!file) { alert("Please select an image"); return; }
            
            const reader = new FileReader();
            reader.onloadend = () => {
                const promos = JSON.parse(localStorage.getItem('dalie_promos')) || [];
                promos.push({
                    id: Date.now(),
                    title: document.getElementById('title').value,
                    oldPrice: document.getElementById('p1').value,
                    newPrice: document.getElementById('p2').value,
                    desc: document.getElementById('desc').value,
                    flash: document.getElementById('flashToggle').checked,
                    image: reader.result
                });
                localStorage.setItem('dalie_promos', JSON.stringify(promos));
                location.reload();
            };
            reader.readAsDataURL(file);
        }

        function load() {
            const promos = JSON.parse(localStorage.getItem('dalie_promos')) || [];
            const views = parseInt(localStorage.getItem('dalie_views')) || 0;
            const clicks = parseInt(localStorage.getItem('dalie_clicks')) || 0;
            const conversion = views > 0 ? ((clicks / views) * 100).toFixed(1) : 0;

            // Render Stats
            document.getElementById('statsDisplay').innerHTML = `
                <div class="stat-card"><span>${views}</span>Total Views</div>
                <div class="stat-card"><span>${clicks}</span>Claim Clicks</div>
                <div class="stat-card"><span>${conversion}%</span>Interest Rate</div>
            `;

            // Render List
            document.getElementById('list').innerHTML = promos.length ? promos.map(p => `
                <div class="promo-item">
                    <div>
                        <b>${p.title}</b> ${p.flash ? '<span class="flash-badge">⚡ Flash</span>' : ''}<br>
                        <small>K${p.newPrice} (Sale)</small>
                    </div>
                    <button onclick="del(${p.id})" style="width:60px; background:#666; font-size:0.7rem; padding:5px;">DEL</button>
                </div>
            `).join('') : "<p>No active deals.</p>";
        }

        function del(id) {
            if(confirm("Delete this special?")) {
                let p = JSON.parse(localStorage.getItem('dalie_promos'));
                p = p.filter(x => x.id !== id);
                localStorage.setItem('dalie_promos', JSON.stringify(p));
                load();
            }
        }
    </script>
</body>
</html>
