<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place D'Alie — Smart Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #B03A2E;
            --red-light: #E74C3C;
            --dark: #0D0D0D;
            --dark-2: #1A1A1A;
            --dark-3: #242424;
            --cream: #FAF6F0;
            --cream-2: #F2EBE0;
            --gold: #C9A84C;
            --gold-light: #E8C96A;
            --white: #FFFFFF;
            --muted: #888;
            --border: rgba(255,255,255,0.08);
            --shadow: 0 8px 32px rgba(0,0,0,0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── NAV ── */
        nav {
            background: var(--dark);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-logo {
            width: 36px;
            height: 36px;
            background: var(--red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.1em;
            color: white;
            font-style: italic;
        }

        .nav-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3em;
            color: var(--white);
            letter-spacing: 0.03em;
        }

        .nav-title span { color: var(--gold); font-style: italic; }

        .staff-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.82em;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .staff-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* ── HERO ── */
        .hero {
            background: var(--dark);
            color: white;
            padding: 56px 32px 48px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 50%, rgba(176,58,46,0.25) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 50%, rgba(201,168,76,0.15) 0%, transparent 60%);
        }

        .hero-sub {
            font-size: 0.78em;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 12px;
            position: relative;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2em, 5vw, 3.5em);
            font-weight: 700;
            line-height: 1.1;
            position: relative;
        }

        .hero h1 em { font-style: italic; color: var(--gold-light); }

        .hero-desc {
            margin-top: 14px;
            color: rgba(255,255,255,0.5);
            font-size: 0.95em;
            position: relative;
        }

        /* ── FILTER TABS ── */
        .filter-bar {
            background: var(--white);
            padding: 0 24px;
            display: flex;
            gap: 4px;
            overflow-x: auto;
            border-bottom: 1px solid #EADFCF;
            position: sticky;
            top: 64px;
            z-index: 100;
            scrollbar-width: none;
        }

        .filter-bar::-webkit-scrollbar { display: none; }

        .filter-tab {
            padding: 16px 20px;
            font-size: 0.85em;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            border: none;
            background: transparent;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .filter-tab:hover { color: var(--dark); }

        .filter-tab.active {
            color: var(--red);
            border-bottom-color: var(--red);
            font-weight: 600;
        }

        /* ── MENU SECTION ── */
        #customerView {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        .section-label {
            font-size: 0.72em;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 20px;
            margin-top: 36px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--cream-2);
        }

        /* ── PROMOTIONS BANNER ── */
        .promo-strip {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
            margin-bottom: 8px;
            scrollbar-width: none;
        }

        .promo-strip::-webkit-scrollbar { display: none; }

        .promo-card {
            background: linear-gradient(135deg, var(--dark) 0%, #2C1A0A 100%);
            border: 1px solid var(--gold);
            border-radius: 14px;
            padding: 20px;
            min-width: 220px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .promo-card::before {
            content: '★ SPECIAL';
            position: absolute;
            top: 12px;
            right: -20px;
            background: var(--gold);
            color: var(--dark);
            font-size: 0.6em;
            font-weight: 700;
            letter-spacing: 0.1em;
            padding: 4px 28px;
            transform: rotate(35deg);
        }

        .promo-card img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
        }

        .promo-card .name {
            font-family: 'Playfair Display', serif;
            color: var(--white);
            font-size: 1em;
        }

        .promo-card .price { color: var(--gold-light); font-size: 1.15em; font-weight: 700; }

        .promo-card .order-btn {
            background: var(--red);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 9px;
            font-size: 0.82em;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.2s;
        }

        .promo-card .order-btn:hover { background: var(--red-light); }

        /* ── REGULAR MENU GRID ── */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 16px;
        }

        .menu-item {
            background: var(--white);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #EBE3D7;
            transition: transform 0.25s, box-shadow 0.25s;
            cursor: default;
        }

        .menu-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.10);
        }

        .menu-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: var(--cream-2);
        }

        .item-info { padding: 12px; }

        .item-info .name {
            font-size: 0.88em;
            font-weight: 600;
            color: var(--dark);
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .item-info .price {
            color: var(--red);
            font-weight: 800;
            font-size: 1em;
        }

        .item-info .order-btn {
            margin-top: 10px;
            width: 100%;
            background: var(--cream-2);
            color: var(--dark);
            border: none;
            border-radius: 7px;
            padding: 8px;
            font-size: 0.78em;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
        }

        .item-info .order-btn:hover {
            background: var(--red);
            color: white;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--dark);
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 0.88em;
            font-weight: 500;
            z-index: 9999;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow);
            border-left: 3px solid var(--gold);
            white-space: nowrap;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ── ADMIN PANEL ── */
        #adminView {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        .admin-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .back-btn {
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85em;
            transition: background 0.2s;
        }

        .back-btn:hover { background: #333; }

        .admin-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6em;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 640px) { .admin-grid { grid-template-columns: 1fr; } }

        .admin-card {
            background: var(--white);
            padding: 24px;
            border-radius: 14px;
            border: 1px solid #EBE3D7;
        }

        .admin-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1em;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid #EBE3D7;
        }

        .field-label {
            font-size: 0.75em;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
            margin-top: 12px;
        }

        .admin-card input[type="text"],
        .admin-card input[type="number"],
        .admin-card select {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #DDD4C4;
            border-radius: 8px;
            font-size: 0.92em;
            font-family: 'DM Sans', sans-serif;
            color: var(--dark);
            background: var(--cream);
            transition: border-color 0.2s;
        }

        .admin-card input:focus,
        .admin-card select:focus {
            outline: none;
            border-color: var(--red);
        }

        .promo-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
            font-size: 0.88em;
            cursor: pointer;
        }

        .promo-toggle input { width: auto; }

        .save-btn {
            width: 100%;
            margin-top: 18px;
            padding: 13px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 9px;
            font-size: 0.92em;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            letter-spacing: 0.03em;
        }

        .save-btn:hover { background: var(--red-light); }

        /* Orders */
        .order-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #EBE3D7;
            font-size: 0.88em;
        }

        .order-row:last-child { border-bottom: none; }

        .order-name { font-weight: 600; }
        .order-time { color: var(--muted); font-size: 0.85em; }

        .status-badge {
            background: #E8F5E9;
            color: #2E7D32;
            font-size: 0.72em;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.05em;
        }

        .orders-full { grid-column: 1 / -1; }

        .hidden { display: none !important; }

        /* empty state */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--muted);
        }

        .empty-state svg { opacity: 0.3; margin-bottom: 16px; }
    </style>
</head>
<body>

<!-- NAV -->
<nav>
    <div class="nav-brand">
        <div class="nav-logo">P</div>
        <span class="nav-title">Place <span>D'Alie</span></span>
    </div>
    <button class="staff-btn" onclick="toggleAdmin()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Staff Login
    </button>
</nav>

<!-- CUSTOMER VIEW -->
<section id="customerView">
    <div class="hero">
        <p class="hero-sub">Fresh &amp; Flavourful</p>
        <h1>Today's <em>Menu</em></h1>
        <p class="hero-desc">Order directly from your table — it's that simple.</p>
    </div>

    <div class="filter-bar" id="filterBar">
        <button class="filter-tab active" data-cat="All" onclick="filterMenu(this)">All</button>
        <button class="filter-tab" data-cat="Promotions" onclick="filterMenu(this)">⭐ Specials</button>
        <button class="filter-tab" data-cat="Main" onclick="filterMenu(this)">Mains</button>
        <button class="filter-tab" data-cat="Sides" onclick="filterMenu(this)">Sides</button>
        <button class="filter-tab" data-cat="Drinks" onclick="filterMenu(this)">Drinks</button>
    </div>

    <div style="max-width:1100px; margin:0 auto; padding:32px 24px 64px;">
        <div id="promoSection">
            <p class="section-label">⭐ Special Promotions</p>
            <div class="promo-strip" id="promoDisplay"></div>
        </div>

        <div id="regularSection">
            <p class="section-label">Menu</p>
            <div class="menu-grid" id="menuDisplay">
                <div class="empty-state" style="grid-column:1/-1">
                    <p>Loading fresh food…</p>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- ADMIN VIEW -->
<section id="adminView" class="hidden">
    <div class="admin-header">
        <button class="back-btn" onclick="toggleAdmin()">← Back to Menu</button>
        <h2>Kitchen Dashboard</h2>
    </div>

    <div class="admin-grid">
        <!-- ADD ITEM -->
        <div class="admin-card">
            <h3>Add / Update Item</h3>
            <label class="field-label">Item Name</label>
            <input type="text" id="itemName" placeholder="e.g. Grilled Chicken">
            <label class="field-label">Price (K)</label>
            <input type="number" id="itemPrice" placeholder="0">
            <label class="field-label">Image URL</label>
            <input type="text" id="itemImg" placeholder="https://…">
            <label class="field-label">Category</label>
            <select id="itemCat">
                <option value="Main">Main Course</option>
                <option value="Promotions">Special Promotions</option>
                <option value="Sides">Sides</option>
                <option value="Drinks">Drinks</option>
            </select>
            <label class="promo-toggle">
                <input type="checkbox" id="itemPromo">
                Feature as Special Promotion
            </label>
            <button class="save-btn" onclick="saveItem()">Save to Menu</button>
        </div>

        <!-- ORDERS -->
        <div class="admin-card orders-full">
            <h3>Live Orders</h3>
            <div id="ordersDisplay">
                <div class="empty-state"><p>No active orders.</p></div>
            </div>
        </div>
    </div>
</section>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    // ── REPLACE WITH YOUR FIREBASE CONFIG ──
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ── TOAST ──
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }
    window.showToast = showToast;

    // ── REAL-TIME MENU ──
    let allItems = [];
    let activeFilter = 'All';

    const menuRef = collection(db, "menu_items");
    const q = query(menuRef, orderBy("category", "asc"));

    onSnapshot(q, (snapshot) => {
        allItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderMenu();
    });

    function renderMenu() {
        const promoDisplay = document.getElementById('promoDisplay');
        const menuDisplay = document.getElementById('menuDisplay');
        const promoSection = document.getElementById('promoSection');

        const filtered = activeFilter === 'All'
            ? allItems
            : allItems.filter(i => i.category === activeFilter || (activeFilter === 'Promotions' && i.promotion));

        const promos = filtered.filter(i => i.promotion);
        const regular = filtered.filter(i => !i.promotion);

        // Promos
        promoSection.style.display = promos.length ? '' : 'none';
        promoDisplay.innerHTML = promos.map(item => `
            <div class="promo-card">
                <img src="${item.img || 'https://placehold.co/220x110/1a1a1a/gold?text=🍽'}" alt="${item.name}" onerror="this.src='https://placehold.co/220x110/1a1a1a/gold?text=🍽'">
                <div class="name">${item.name}</div>
                <div class="price">K${item.price}</div>
                <button class="order-btn" onclick="placeOrder('${item.name}')">Order Now</button>
            </div>
        `).join('');

        // Regular
        menuDisplay.innerHTML = regular.length
            ? regular.map(item => `
                <div class="menu-item">
                    <img src="${item.img || 'https://placehold.co/170x120/f2ebe0/888?text=🍽'}" alt="${item.name}" onerror="this.src='https://placehold.co/170x120/f2ebe0/888?text=🍽'">
                    <div class="item-info">
                        <div class="name">${item.name}</div>
                        <div class="price">K${item.price}</div>
                        <button class="order-btn" onclick="placeOrder('${item.name}')">+ Order</button>
                    </div>
                </div>
            `).join('')
            : `<div class="empty-state" style="grid-column:1/-1"><p>No items here yet.</p></div>`;
    }

    window.filterMenu = (btn) => {
        document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.cat;
        renderMenu();
    };

    // ── SAVE ITEM ──
    window.saveItem = async () => {
        const name = document.getElementById('itemName').value.trim();
        const price = document.getElementById('itemPrice').value.trim();
        if (!name || !price) { showToast('⚠ Name and price are required.'); return; }

        await addDoc(menuRef, {
            name,
            price,
            img: document.getElementById('itemImg').value.trim(),
            category: document.getElementById('itemCat').value,
            promotion: document.getElementById('itemPromo').checked
        });

        // Clear form
        ['itemName','itemPrice','itemImg'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('itemPromo').checked = false;
        showToast('✓ Menu updated successfully!');
    };

    // ── ORDER ──
    window.placeOrder = async (name) => {
        await addDoc(collection(db, "orders"), {
            item: name,
            time: new Date().toLocaleTimeString(),
            status: "New"
        });
        showToast(`✓ Order placed — ${name}`);
    };

    // ── LIVE ORDERS (admin) ──
    onSnapshot(query(collection(db, "orders"), orderBy("time", "desc")), (snapshot) => {
        const el = document.getElementById('ordersDisplay');
        if (snapshot.empty) {
            el.innerHTML = '<div class="empty-state"><p>No active orders.</p></div>';
            return;
        }
        el.innerHTML = snapshot.docs.slice(0, 20).map(doc => {
            const d = doc.data();
            return `
                <div class="order-row">
                    <div>
                        <div class="order-name">${d.item}</div>
                        <div class="order-time">${d.time}</div>
                    </div>
                    <span class="status-badge">${d.status}</span>
                </div>
            `;
        }).join('');
    });

    // ── TOGGLE ADMIN ──
    let isAdmin = false;
    window.toggleAdmin = () => {
        if (!isAdmin) {
            const pin = prompt("Enter Staff PIN:");
            if (pin === "1234") {
                isAdmin = true;
            } else if (pin !== null) {
                showToast('✗ Access denied');
                return;
            } else return;
        } else {
            isAdmin = false;
        }

        document.getElementById('customerView').classList.toggle('hidden', isAdmin);
        document.getElementById('adminView').classList.toggle('hidden', !isAdmin);
    };
</script>

</body>
</html>
